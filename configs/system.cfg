 description Clustering Interface
!
interface Ethernet1/1
!
class default
  limit-resource All 0
  limit-resource Mac-addresses 65536
  limit-resource user2 5
  limit-resource SSH 5
  limit-resource Telnet 5
!

ftp mode passive
cluster group fw-346
 key secretkey
 local-unit unit-1-1
 cluster-interface Port-channel48 ip 203.0.113.87 255.255.0.0
 priority 9
 health-check holdtime 3
 health-check data-interface auto-rejoin 3 5 2
 health-check cluster-interface auto-rejoin unlimited 5 1
 enable
pager lines 24
mtu cluster 9184
no failover
user2 image disk0:/user2-openjre-7131.bin
no user2 history enable
arp timeout 14400
no arp permit-nonconnected
arp rate-limit 32768
ssh stricthostkeycheck
console timeout 0
!
tls-proxy maximum-session 1000
!

